<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Translator Pro</title>

<style>
body {
  font-family:'Segoe UI';
  margin:0;
  background:linear-gradient(135deg,#667eea,#764ba2);
  overflow:hidden;
}

/* bubbles */
.bubble{
  position:absolute;
  width:20px;height:20px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  animation:float 10s infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* login */
.login-modal{
  position:fixed;
  width:100%;height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}
.login-box{
  background:#fff;
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
  animation:pop .4s ease;
}
@keyframes pop{
  from{transform:scale(.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* forgot popup */
.forgot-modal{
  position:fixed;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}

input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:#fff;
  cursor:pointer;
}
button:hover{background:#556cd6;}

.small-btn { background:#34d399; }
.swap-btn { background:#ff9800; }

/* app */
.container{
  display:none;
  max-width:900px;
  margin:30px auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  animation:fade .5s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

textarea{
  width:100%;
  height:100px;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

.history{
  margin-top:10px;
  max-height:150px;
  overflow:auto;
  background:#f9f9f9;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<script>
for(let i=0;i<25;i++){
  let b=document.createElement("div");
  b.className="bubble";
  b.style.left=Math.random()*100+"%";
  b.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(b);
}
</script>

<!-- LOGIN -->
<div class="login-modal" id="loginModal">
  <div class="login-box">
    <h2>🔐 Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <br>
    <input type="checkbox" onclick="togglePass()"> Show Password
    <br><br>
    <button onclick="login()">Login / Register</button>
    <br><br>
    <button onclick="openForgot()">Forgot Password</button>
  </div>
</div>

<!-- FORGOT PASSWORD POPUP -->
<div class="forgot-modal" id="forgotModal">
  <div class="login-box">
    <h3>Reset Password</h3>
    <input id="fpUser" placeholder="Enter Username">
    <input id="fpNewPass" type="password" placeholder="New Password">
    <button onclick="resetPassword()">Update Password</button>
    <br><br>
    <button onclick="closeForgot()">Back</button>
  </div>
</div>

<!-- APP -->
<div class="container" id="app">
<h2>🌍 Welcome <span id="userDisplay"></span></h2>

<textarea id="sourceText" placeholder="Type or speak..."></textarea>

<div class="controls">
  <select id="targetLang"></select>
  <button class="swap-btn" onclick="swapLang()">🔁</button>
</div>

<div class="controls">
  <button onclick="translateText()">Translate</button>
  <button onclick="rewriteText()">🧠 AI Fix</button>
  <button onclick="startVoice()">🎤 Speak</button>
  <button class="small-btn" onclick="speakText()">🔊 Listen</button>
  <button class="small-btn" onclick="copyText()">📋 Copy</button>
  <button onclick="logout()">Logout</button>
</div>

<textarea id="translatedText" readonly></textarea>

<div class="controls">
  <button onclick="clearHistory()">🗑 Clear History</button>
</div>

<div class="history" id="history"></div>
</div>

<script>
// 🌍 languages
const languages = {
  en:"English", hi:"Hindi", te:"Telugu", ta:"Tamil", bn:"Bengali",
  kn:"Kannada", ml:"Malayalam", mr:"Marathi", gu:"Gujarati",
  pa:"Punjabi", ur:"Urdu", ar:"Arabic", zh:"Chinese", ja:"Japanese",
  ko:"Korean", fr:"French", de:"German", es:"Spanish",
  it:"Italian", ru:"Russian", pt:"Portuguese", tr:"Turkish"
};

for(let code in languages){
  targetLang.innerHTML += `<option value="${code}">${languages[code]}</option>`;
}

// 👥 users
let users = JSON.parse(localStorage.getItem("users")||"{}");

// LOGIN
function login(){
  let u=username.value.trim();
  let p=password.value.trim();

  if(!u||!p) return alert("Enter details");

  if(users[u]){
    if(users[u].password!==p){
      alert("Wrong password. Use Forgot Password.");
      return;
    }
  } else {
    users[u]={password:p,history:[]};
  }

  localStorage.setItem("users",JSON.stringify(users));
  sessionStorage.setItem("currentUser",u);
  startApp();
}

function togglePass(){
  password.type = password.type==="password"?"text":"password";
}

// START
function startApp(){
  let u=sessionStorage.getItem("currentUser");
  if(!u) return;

  loginModal.style.display="none";
  app.style.display="block";
  userDisplay.innerText=u;

  renderHistory();
}

// ✅ FIXED LOGOUT
function logout(){
  sessionStorage.removeItem("currentUser");
  app.style.display="none";
  loginModal.style.display="flex";
}

// 🌐 translate
async function translateText(){
  let text=sourceText.value.trim();
  if(!text) return;

  const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang.value}&dt=t&q=${encodeURIComponent(text)}`;

  let res=await fetch(url);
  let data=await res.json();

  let translated="";
  data[0].forEach(i=>translated+=i[0]);

  translatedText.value=translated;
  saveHistory(text,translated);
}

// 🧠 AI fix
function rewriteText(){
  let text=sourceText.value.trim();
  if(!text) return;

  text=text.charAt(0).toUpperCase()+text.slice(1);
  if(!text.endsWith(".")) text+=".";

  translatedText.value=text;
  saveHistory("AI Fix",text);
}

// 🎤 voice
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = e=>{
    sourceText.value = e.results[0][0].transcript;
  };

  recognition.start();
}

// 🔊 speak
function speakText(){
  const text = translatedText.value;
  if(!text) return;
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

// 📋 copy
function copyText(){
  navigator.clipboard.writeText(translatedText.value);
  alert("Copied!");
}

// 📜 history FIXED
function saveHistory(src,trans){
  let u=sessionStorage.getItem("currentUser");
  if(!u || !users[u]) return;

  if(!users[u].history) users[u].history=[];

  users[u].history.unshift({src,trans});
  localStorage.setItem("users",JSON.stringify(users));
  renderHistory();
}

function renderHistory(){
  let u=sessionStorage.getItem("currentUser");
  if(!u || !users[u]) return;

  let list=users[u].history||[];

  history.innerHTML="";
  list.slice(0,10).forEach(h=>{
    history.innerHTML+=`<p>${h.src} → ${h.trans}</p>`;
  });
}

function clearHistory(){
  let u=sessionStorage.getItem("currentUser");
  if(!u || !users[u]) return;

  users[u].history=[];
  localStorage.setItem("users",JSON.stringify(users));
  renderHistory();
}

// 🔑 FORGOT PASSWORD UI
function openForgot(){
  loginModal.style.display="none";
  forgotModal.style.display="flex";
}

function closeForgot(){
  forgotModal.style.display="none";
  loginModal.style.display="flex";
}

function resetPassword(){
  let u = fpUser.value.trim();
  let p = fpNewPass.value.trim();

  if(!u || !p) return alert("Enter details");

  if(!users[u]){
    alert("User not found");
    return;
  }

  users[u].password = p;
  localStorage.setItem("users",JSON.stringify(users));

  alert("Password updated!");
  closeForgot();
}

// start
startApp();
</script>

</body>
</html>
