<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Translator Pro</title>

<style>
body {
  font-family:'Segoe UI';
  margin:0;
  background:linear-gradient(135deg,#667eea,#764ba2);
  overflow:hidden;
}
.bubble{
  position:absolute;
  width:20px;height:20px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  animation:float 10s infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
.login-modal{
  position:fixed;
  width:100%;height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}
.login-box{
  background:#fff;
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
  animation:pop .4s ease;
}
@keyframes pop{
  from{transform:scale(.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.forgot-modal{
  position:fixed;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.5);
}
input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:#fff;
  cursor:pointer;
}
button:hover{background:#556cd6;}
.small-btn { background:#34d399; }
.swap-btn { background:#ff9800; }

.container{
  display:none;
  max-width:900px;
  margin:30px auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  animation:fade .5s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
textarea{
  width:100%;
  height:100px;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}
.history{
  margin-top:10px;
  max-height:150px;
  overflow:auto;
  background:#f9f9f9;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<script>
for(let i=0;i<25;i++){
  let b=document.createElement("div");
  b.className="bubble";
  b.style.left=Math.random()*100+"%";
  b.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(b);
}
</script>

<div class="login-modal" id="loginModal">
  <div class="login-box">
    <h2>🔐 Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <br>
    <input type="checkbox" onclick="togglePass()"> Show Password
    <br><br>
    <button onclick="login()">Login / Register</button>
    <br><br>
    <button onclick="openForgot()">Forgot Password</button>
  </div>
</div>

<div class="forgot-modal" id="forgotModal">
  <div class="login-box">
    <h3>Reset Password</h3>
    <input id="fpUser" placeholder="Enter Username">
    <input id="fpNewPass" type="password" placeholder="New Password">
    <button onclick="resetPassword()">Update Password</button>
    <br><br>
    <button onclick="closeForgot()">Back</button>
  </div>
</div>

<div class="container" id="app">
<h2>🌍 Welcome <span id="userDisplay"></span></h2>

<textarea id="sourceText" placeholder="Type or speak..."></textarea>

<div class="controls">
  <select id="targetLang"></select>
  <button class="swap-btn">🔁</button>
</div>

<div class="controls">
  <button onclick="translateText()">Translate</button>
  <button onclick="rewriteText()">🧠 AI Fix</button>
  <button onclick="startVoice()">🎤 Speak</button>
  <button class="small-btn" onclick="speakText()">🔊 Listen</button>
  <button class="small-btn" onclick="copyText()">📋 Copy</button>
  <button onclick="downloadExcel()">📊 Excel</button>
  <button onclick="downloadText()">📄 Text</button>
  <button onclick="logout()">Logout</button>
</div>

<textarea id="translatedText" readonly></textarea>

<div class="history" id="history"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const languages = {
  en:"English", hi:"Hindi", te:"Telugu", ta:"Tamil", bn:"Bengali",
  kn:"Kannada", ml:"Malayalam", mr:"Marathi", gu:"Gujarati",
  pa:"Punjabi", ur:"Urdu", ar:"Arabic", zh:"Chinese", ja:"Japanese",
  ko:"Korean", fr:"French", de:"German", es:"Spanish",
  it:"Italian", ru:"Russian", pt:"Portuguese", tr:"Turkish"
};

for(let code in languages){
  targetLang.innerHTML += `<option value="${code}">${languages[code]}</option>`;
}

let users = JSON.parse(localStorage.getItem("users")||"{}");

// ✅ STRICT LOGIN FIX
function login(){
  let u=username.value.trim();
  let p=password.value.trim();

  if(!u||!p) return alert("Enter details");

  if(users[u]){
    if(users[u].password === p){
      sessionStorage.setItem("currentUser",u);
      startApp();
    } else {
      alert("❌ Wrong username or password");
    }
  } else {
    users[u]={password:p,history:[]};
    localStorage.setItem("users",JSON.stringify(users));
    sessionStorage.setItem("currentUser",u);
    startApp();
  }
}

function togglePass(){
  password.type = password.type==="password"?"text":"password";
}

function startApp(){
  let u=sessionStorage.getItem("currentUser");
  if(!u) return;

  loginModal.style.display="none";
  app.style.display="block";
  userDisplay.innerText=u;

  renderHistory();
}

function logout(){
  sessionStorage.removeItem("currentUser");
  app.style.display="none";
  loginModal.style.display="flex";
}

// translate
async function translateText(){
  let text=sourceText.value.trim();
  if(!text) return;

  const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang.value}&dt=t&q=${encodeURIComponent(text)}`;

  let res=await fetch(url);
  let data=await res.json();

  let translated="";
  data[0].forEach(i=>translated+=i[0]);

  translatedText.value=translated;
  saveHistory(text,translated);
}

// 🔊 FULL LANGUAGE SUPPORT FIX
function speakText(){
  let text = translatedText.value;
  if(!text) return;

  let utter = new SpeechSynthesisUtterance(text);

  let voices = speechSynthesis.getVoices();

  let langMap = {
    en:"en-US", hi:"hi-IN", te:"te-IN", ta:"ta-IN", bn:"bn-IN",
    kn:"kn-IN", ml:"ml-IN", mr:"mr-IN", gu:"gu-IN",
    pa:"pa-IN", ur:"ur-PK", ar:"ar-SA", zh:"zh-CN",
    ja:"ja-JP", ko:"ko-KR", fr:"fr-FR", de:"de-DE",
    es:"es-ES", it:"it-IT", ru:"ru-RU", pt:"pt-PT", tr:"tr-TR"
  };

  utter.lang = langMap[targetLang.value] || "en-US";

  let voice = voices.find(v => v.lang === utter.lang);
  if(voice) utter.voice = voice;

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

// ensure voices load
speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };

// rest unchanged
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";
  recognition.onresult = e=>{ sourceText.value = e.results[0][0].transcript; };
  recognition.start();
}

function copyText(){
  navigator.clipboard.writeText(translatedText.value);
  alert("Copied!");
}

function saveHistory(src,trans){
  let u=sessionStorage.getItem("currentUser");
  let freshUsers = JSON.parse(localStorage.getItem("users")||"{}");
  if(!freshUsers[u]) freshUsers[u]={password:"",history:[]};
  freshUsers[u].history.unshift({src,trans});
  localStorage.setItem("users",JSON.stringify(freshUsers));
  users=freshUsers;
  renderHistory();
}

function renderHistory(){
  let u=sessionStorage.getItem("currentUser");
  let freshUsers = JSON.parse(localStorage.getItem("users")||"{}");
  let list=freshUsers[u]?.history||[];
  history.innerHTML="";
  list.slice(0,10).forEach(h=>{
    history.innerHTML+=`<p>${h.src} → ${h.trans}</p>`;
  });
}

function openForgot(){ loginModal.style.display="none"; forgotModal.style.display="flex"; }
function closeForgot(){ forgotModal.style.display="none"; loginModal.style.display="flex"; }

function resetPassword(){
  let u = fpUser.value.trim();
  let p = fpNewPass.value.trim();
  if(!u || !p) return alert("Enter details");
  if(!users[u]) return alert("User not found");
  users[u].password = p;
  localStorage.setItem("users",JSON.stringify(users));
  alert("Password updated!");
  closeForgot();
}

// downloads
function downloadExcel(){
  let data=[{Source:sourceText.value,Translation:translatedText.value}];
  let ws=XLSX.utils.json_to_sheet(data);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Translation");
  XLSX.writeFile(wb,"translation.xlsx");
}

function downloadText(){
  let blob=new Blob([`Source:\n${sourceText.value}\n\nTranslation:\n${translatedText.value}`],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="translation.txt";
  a.click();
}

startApp();
</script>

</body>
</html>
