<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Translator Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ===== GENERAL ===== */
body{
  font-family:'Roboto',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  color:#333;
  overflow-x:hidden;
}
textarea, input, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:15px;
  resize:none;
}

/* ===== FLOATING BUBBLES ===== */
.bubble{
  position:absolute;
  width:14px;height:14px;
  background:rgba(255,255,255,.15);
  border-radius:50%;
  animation:float 12s infinite linear;
}
@keyframes float{
  from{transform:translateY(110vh);}
  to{transform:translateY(-10vh);}
}

/* ===== MODALS ===== */
.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.6);
  z-index:1000;
}
.modal-content{
  background:#fff;
  padding:30px;
  width:330px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,.3);
  animation:pop .4s ease;
}
@keyframes pop{
  from{transform:scale(.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* ===== BUTTONS ===== */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
}
.primary-btn{background:#667eea;color:#fff}
.green-btn{background:#34d399;color:#fff}
.orange-btn{background:#ff9800;color:#fff}
.blue-btn{background:#3b82f6;color:#fff}
button:hover{opacity:.9}

/* ===== APP CONTAINER ===== */
.container{
  display:none;
  max-width:1000px;
  margin:40px auto;
  padding:25px;
}

/* ===== HEADER ===== */
.app-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(135deg,#4f6ef7,#667eea);
  color:#fff;
  padding:18px 22px;
  border-radius:16px;
  margin-bottom:25px;
}
.app-header small{display:block;font-size:13px;opacity:.9}

/* ===== CARDS ===== */
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
  margin-bottom:20px;
}

/* ===== CONTROLS ===== */
.controls, .toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.toolbar button{flex:1}

/* ===== HISTORY ===== */
.history p{
  background:#f9f9f9;
  padding:8px 10px;
  border-radius:8px;
  margin:6px 0;
  font-size:14px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

/* ===== VOICE OVERLAY ===== */
.voice-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}
.voice-box{
  background:#3b82f6;
  color:white;
  padding:30px;
  border-radius:20px;
  font-size:22px;
  text-align:center;
}

</style>
</head>
<body>

<script>
for(let i=0;i<25;i++){
  let b=document.createElement("div");
  b.className="bubble";
  b.style.left=Math.random()*100+"%";
  b.style.animationDuration=(6+Math.random()*10)+"s";
  document.body.appendChild(b);
}
</script>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h2>🔐 Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <label><input type="checkbox" onclick="togglePass()"> Show password</label><br><br>
    <button class="primary-btn" onclick="login()">Login / Register</button><br><br>
    <button class="blue-btn" onclick="openForgot()">Forgot Password</button>
  </div>
</div>

<!-- FORGOT -->
<div class="modal" id="forgotModal" style="display:none">
  <div class="modal-content">
    <h3>Reset Password</h3>
    <input id="fpUser" placeholder="Username">
    <input id="fpNewPass" type="password" placeholder="New Password"><br>
    <button class="primary-btn" onclick="resetPassword()">Update</button><br><br>
    <button class="blue-btn" onclick="closeForgot()">Back</button>
  </div>
</div>

<!-- VOICE -->
<div class="voice-overlay" id="voiceOverlay">
  <div class="voice-box">🎤 Listening...</div>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="app-header">
    <div>
      🌍 Ultimate Translator Pro
      <small>Welcome <span id="userDisplay"></span></small>
    </div>
    <button class="blue-btn" onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <textarea id="sourceText" rows="3" placeholder="Type or speak..."></textarea>
    <div class="controls" style="margin-top:10px">
      <select id="targetLang"></select>
      <button class="orange-btn" onclick="startVoice()">🎤 Speak</button>
    </div>
    <div class="toolbar" style="margin-top:15px">
      <button class="orange-btn" onclick="translateText()">Translate</button>
      <button class="green-btn" onclick="rewriteText()">AI Fix</button>
      <button class="blue-btn" onclick="copyText()">Copy</button>
      <button class="green-btn" onclick="speakText()">Listen</button>
    </div>
  </div>

  <div class="card">
    <textarea id="translatedText" rows="3" readonly placeholder="Translated text..."></textarea>
    <div class="controls" style="margin-top:10px">
      <button class="blue-btn" onclick="downloadText()">Download TXT</button>
      <button class="green-btn" onclick="downloadExcel()">Download Excel</button>
    </div>
  </div>

  <div class="card">
    <h4>Translation History</h4>
    <div class="history" id="history"></div>
  </div>

</div>

<script>
const languages={en:"English",hi:"Hindi",te:"Telugu",ta:"Tamil",fr:"French",de:"German",es:"Spanish"};
targetLang.innerHTML=Object.entries(languages).map(
  ([k,v])=>`<option value="${k}">${v}</option>`).join("");

let users=JSON.parse(localStorage.getItem("users")||"{}");

function login(){
  let u=username.value.trim(),p=password.value.trim();
  if(!u||!p) return alert("Enter details");
  if(users[u]&&users[u].password!==p) return alert("Wrong password");
  if(!users[u]) users[u]={password:p,history:[]};
  localStorage.setItem("users",JSON.stringify(users));
  sessionStorage.setItem("currentUser",u);
  startApp();
}
function startApp(){
  let u=sessionStorage.getItem("currentUser");
  if(!u) return;
  loginModal.style.display="none";
  forgotModal.style.display="none";
  app.style.display="block";
  userDisplay.innerText=u;
  renderHistory();
}
function logout(){
  sessionStorage.clear();
  app.style.display="none";
  loginModal.style.display="flex";
}
function translateText(){
  let t=sourceText.value.trim();
  if(!t) return;
  fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang.value}&dt=t&q=${encodeURIComponent(t)}`)
  .then(r=>r.json()).then(d=>{
    translatedText.value=d[0].map(i=>i[0]).join("");
    saveHistory(t,translatedText.value);
  });
}
function rewriteText(){
  let t=sourceText.value.trim();
  if(!t) return;
  let f=t.charAt(0).toUpperCase()+t.slice(1);
  if(!f.endsWith("."))f+=".";
  translatedText.value=f;
  saveHistory("AI Fix",f);
}
function startVoice(){
  voiceOverlay.style.display="flex";
  const rec=new (window.SpeechRecognition||webkitSpeechRecognition)();
  rec.onresult=e=>{
    sourceText.value=e.results[0][0].transcript;
    voiceOverlay.style.display="none";
  };
  rec.start();
}
function speakText(){
  if(!translatedText.value) return;
  speechSynthesis.speak(new SpeechSynthesisUtterance(translatedText.value));
}
function copyText(){
  navigator.clipboard.writeText(translatedText.value);
  alert("Copied");
}
function saveHistory(s,t){
  let u=sessionStorage.getItem("currentUser");
  users[u].history.unshift({s,t});
  localStorage.setItem("users",JSON.stringify(users));
  renderHistory();
}
function renderHistory(){
  let u=sessionStorage.getItem("currentUser");
  history.innerHTML=users[u].history.slice(0,10)
  .map(h=>`<p>${h.s} → ${h.t}</p>`).join("");
}
function downloadText(){
  let b=new Blob([translatedText.value],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(b);a.download="translation.txt";a.click();
}
function downloadExcel(){
  let c="data:text/csv;charset=utf-8,"+translatedText.value;
  let a=document.createElement("a");
  a.href=encodeURI(c);a.download="translation.csv";a.click();
}
function togglePass(){
  password.type=password.type==="password"?"text":"password";
}
function openForgot(){loginModal.style.display="none";forgotModal.style.display="flex";}
function closeForgot(){forgotModal.style.display="none";loginModal.style.display="flex";}
function resetPassword(){
  users[fpUser.value].password=fpNewPass.value;
  localStorage.setItem("users",JSON.stringify(users));
  alert("Updated");
  closeForgot();
}
startApp();
</script>
</body>
</html>
